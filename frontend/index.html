<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>metaverse.center — a worldbuilding framework</title>
    <meta name="description" content="Build and explore simulated worlds. Create agents, buildings, events, and social dynamics in interconnected shards of reality." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://metaverse.center/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="metaverse.center" />
    <meta property="og:title" content="metaverse.center — a worldbuilding framework" />
    <meta property="og:description" content="Build and explore simulated worlds. Create agents, buildings, events, and social dynamics in interconnected shards of reality." />
    <meta property="og:url" content="https://metaverse.center/" />
    <meta property="og:image" content="https://bffjoupddfjaljqrwqck.supabase.co/storage/v1/object/public/simulation.assets/platform/dashboard-hero.avif" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="metaverse.center — a worldbuilding framework" />
    <meta name="twitter:description" content="Build and explore simulated worlds. Create agents, buildings, events, and social dynamics in interconnected shards of reality." />
    <meta name="twitter:image" content="https://bffjoupddfjaljqrwqck.supabase.co/storage/v1/object/public/simulation.assets/platform/dashboard-hero.avif" />

    <!-- hreflang (client-side locale, not path-based) -->
    <link rel="alternate" hreflang="en" href="https://metaverse.center/" />
    <link rel="alternate" hreflang="de" href="https://metaverse.center/" />
    <link rel="alternate" hreflang="x-default" href="https://metaverse.center/" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "metaverse.center",
      "url": "https://metaverse.center/",
      "description": "Build and explore simulated worlds. Create agents, buildings, events, and social dynamics in interconnected shards of reality.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://metaverse.center/dashboard?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Google Fonts: per-simulation heading fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;800&family=Cormorant+Garamond:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Oswald:wght@400;700;900&family=Space+Mono:wght@400;700&family=Spectral:ital,wght@0,400;0,600;0,700;1,400&display=swap" />

    <!-- LCP hero preload -->
    <link rel="preload" as="image" fetchpriority="high"
          href="https://bffjoupddfjaljqrwqck.supabase.co/storage/v1/object/public/simulation.assets/platform/dashboard-hero.avif" />

    <!-- Critical CSS: prevent white flash before external CSS loads -->
    <style>
      body { margin: 0; background: #0a0a0f; color: #e2e2e8; }
      velg-app { display: block; min-height: 100vh; }
    </style>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
